name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        # Do NOT specify a version here. It will read from package.json "packageManager"
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint (web)
        run: pnpm --filter @basket/web lint

      - name: Typecheck (web)
        run: pnpm --filter @basket/web typecheck

      - name: Test (web)
        env:
          CI: "true"
        run: pnpm --filter @basket/web test -- --ci

      - name: Build (web)
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: pnpm --filter @basket/web build
