name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Show Node, npm
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: npx pnpm@9.1.0 install --no-frozen-lockfile

      - name: Lint (web)
        run: npx pnpm@9.1.0 --filter @basket/web lint

      - name: Typecheck (web)
        run: npx pnpm@9.1.0 --filter @basket/web typecheck

      - name: Test (web)
        env:
          CI: "true"
        run: npx pnpm@9.1.0 --filter @basket/web test -- --ci

      - name: Build (web)
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npx pnpm@9.1.0 --filter @basket/web build